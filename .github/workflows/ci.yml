name: CI

on:
    push:
        branches:
            - main
            - master
    pull_request:

permissions:
    contents: read

jobs:
    verify:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Enable pnpm
              run: corepack enable

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint
              run: pnpm lint

            - name: Check formatting
              run: pnpm format:check

            - name: Typecheck
              run: pnpm typecheck

            - name: Build
              run: pnpm build
